services:
  - type: web
    name: elemental-concept-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd dashboard && npm install && npm run build
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: "https://elemental-concept-api.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: VITE_API_BASE_URL
        value: "https://elemental-concept-api.onrender.com"
